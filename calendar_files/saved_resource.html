<style>html,body,#root{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;margin:0;padding:0}html,body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Oxygen,Ubuntu,Cantarell,Helvetica Neue,Arial,sans-serif!important}button,input,textarea,select{font-family:inherit}html{background-color:transparent}html.chatgptOled.dark,html.mobileSkybridge.dark{background-color:#000}@supports (font: -apple-system-body){html.mobileSkybridge{font:-apple-system-body}}html.desktopSkybridge.dark{background-color:#1e1e1e}html.androidSkybridge,html.androidSkybridge body,html.androidSkybridge *{-webkit-tap-highlight-color:rgba(255,255,255,0)}html.androidSkybridge *::selection,html.androidSkybridge *::-moz-selection{background:#fff0;color:inherit}</style></head>

<body>

    <div id="header-placeholder"></div>

    <section class="calendar-hero">
        <div class="calendar-overlay"></div>
        <div class="container calendar-hero-content">
            <span class="calendar-eyebrow">NTX EARTHQUAKES</span>
            <h1>2026 Team Calendar</h1>
            <p>Practices, games, tryouts, team events, meetings, and club activities.</p>
        </div>
    </section>

    <section class="month-nav-section">
        <div class="container">
            <div class="month-nav" id="monthNav"></div>
        </div>
    </section>

    <section class="calendar-section">
        <div class="container">
            <div class="calendar-layout">
                <div class="calendar-main">
                    <div id="calendarContainer"></div>
                </div>

                <aside class="games-sidebar">
                    <div class="games-sidebar-inner">
                        <div class="games-header">
                            <span class="calendar-eyebrow">Schedule</span>

                        </div>
                        <div id="games-list"></div>
                    </div>
                </aside>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 NTX Earthquakes Soccer Club</p>
    </footer>

    <script src="./loadHeader.js.download"></script>

    <script>
        function generatePracticeEvents() {
            const practices = [];
            const startDate = new Date('2026-01-01');
            const endDate = new Date('2027-12-31');
            const current = new Date(startDate);

            while (current <= endDate) {
                const day = current.getDay();
                if (day === 1 || day === 4) {
                    practices.push({
                        Date:
                            current.getFullYear() + '-' +
                            String(current.getMonth() + 1).padStart(2, '0') + '-' +
                            String(current.getDate()).padStart(2, '0'),
                        Time: '6:00 PM',
                        Location: 'The Grove - Frisco',
                        FieldNumber: '',
                        EventType: 'Practice'
                    });
                }
                current.setDate(current.getDate() + 1);
            }

            return practices;
        }

        window.generatePracticeEvents = generatePracticeEvents;
    </script>

    <script src="./calendar.js.download"></script>
    <script src="./mobile-nav.js.download"></script>

    <div class="recruitment-modal" id="eventModal">

        <div class="recruitment-modal-content">
            <button class="modal-close" onclick="closeEventModal()">×</button>
            <div id="eventModalContent"></div>
        </div>
    </div>
