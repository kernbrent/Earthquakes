
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NTX Earthquakes Calendar</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="header-placeholder"></div>

<section class="calendar-hero">

    <div class="calendar-overlay"></div>

    <div class="container calendar-hero-content">

        <span class="calendar-eyebrow">
            NTX EARTHQUAKES
        </span>

        <h1>
            2026 Team Calendar
        </h1>

        <p>
            Practices, games, tryouts, team events,
            meetings, and club activities.
        </p>

    </div>

</section>

<section class="month-nav-section">

    <div class="container">

        <div class="month-nav" id="monthNav"></div>

    </div>

</section>

<section class="calendar-section">

    <div class="container">

        <div class="calendar-layout">

            <div class="calendar-main">
                <div id="calendarContainer"></div>
            </div>

            <aside class="games-sidebar">

                <div class="games-sidebar-inner">

                    <div class="games-header">

                        <span class="calendar-eyebrow">
                            Schedule
                        </span>

                        <h3>
                            Upcoming Games
                        </h3>

                    </div>

                    <div id="games-list"></div>

                </div>

            </aside>

        </div>

    </div>

</section>

<footer>
<p>© 2026 NTX Earthquakes Soccer Club</p>
</footer>

<script src="js/loadHeader.js"></script>
<script src="js/calendar.js"></script>
<script src="js/mobile-nav.js"></script>

</body>
</html>
